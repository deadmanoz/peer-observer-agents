name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number
  issue_comment:
    types: [created]

jobs:
  review:
    name: Claude Review
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_users: "deadmanoz"
          timeout_minutes: 30

          direct_prompt: >
            You are reviewing a PR for peer-observer-agents, a Rust service that
            receives Alertmanager webhooks and dispatches Claude Code CLI to
            investigate Bitcoin P2P network alerts. Results are posted as Grafana
            annotations.

            Key context:
            - Single binary, axum HTTP server, tokio async runtime
            - Uses reqwest for Grafana API, serde for JSON, tracing for structured logging
            - Each alert gets a stable alert_id for log correlation
            - Deployed via NixOS flake on peer-observer infrastructure

            Review this PR for:
            1. Correctness — logic errors, edge cases, error handling
            2. Safety — no panics in production paths, proper error propagation
            3. Rust idioms — ownership, lifetimes, unnecessary clones
            4. Security — injection risks, secret handling, input validation
            5. Concurrency — tokio task safety, shared state, deadlock potential
