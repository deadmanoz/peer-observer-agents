name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review pull request #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Use `gh pr diff ${{ github.event.pull_request.number }}` to get the diff.
            Read the changed files to understand context.

            For each issue found, use the mcp__github_inline_comment__create_inline_comment tool to post an inline review comment on the specific file and line.

            Focus on: bugs, security issues, logic errors, and correctness. Skip style nits.
          claude_args: '--allowedTools "mcp__github_inline_comment__create_inline_comment" "Bash(gh pr diff:*)" "Bash(gh pr view:*)" "Bash(gh pr comment:*)" "Bash(gh api:*)" "Read" "Glob" "Grep" "Agent"'
